<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KB RAG System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --primary-light: #eef2ff;
            --secondary: #64748b;
            --success: #10b981;
            --success-light: #d1fae5;
            --error: #ef4444;
            --error-light: #fee2e2;
            --warning: #f59e0b;
            --warning-light: #fef3c7;
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --bg-code: #1e293b;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --text-code: #e2e8f0;
            --border: #e2e8f0;
            --border-focus: #4f46e5;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-secondary);
            min-height: 100vh;
            color: var(--text-primary);
            line-height: 1.6;
        }

        .header {
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 2rem;
            box-shadow: var(--shadow-sm);
        }

        .header-content {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .status-badge.healthy {
            background: var(--success-light);
            color: #065f46;
        }

        .status-badge.unhealthy {
            background: var(--error-light);
            color: #991b1b;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 2rem;
        }

        .config-section {
            background: var(--bg-primary);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
        }

        .config-section h2 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .config-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .panel {
            background: var(--bg-primary);
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            height: fit-content;
        }

        .panel-header {
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .panel-header h2 {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .panel-header p {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .endpoint-selector {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .endpoint-btn {
            flex: 1;
            padding: 0.75rem 1rem;
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .endpoint-btn:hover {
            border-color: var(--primary);
            background: var(--primary-light);
        }

        .endpoint-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .form-group .description {
            font-size: 0.8125rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.625rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.875rem;
            font-family: inherit;
            transition: all 0.2s;
            background: var(--bg-primary);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
            font-family: 'Monaco', 'Courier New', monospace;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .form-group input[type="password"] {
            font-family: monospace;
        }

        .form-group input[readonly] {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            cursor: not-allowed;
            opacity: 0.7;
        }

        .code-preview {
            background: var(--bg-code);
            border-radius: 6px;
            padding: 1rem;
            overflow-x: auto;
            position: sticky;
            top: 2rem;
        }

        .code-preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .code-preview-header span {
            font-size: 0.8125rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .copy-btn {
            padding: 0.375rem 0.75rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            color: var(--text-code);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .code-preview pre {
            margin: 0;
            color: var(--text-code);
            font-size: 0.8125rem;
            line-height: 1.6;
            font-family: 'Monaco', 'Courier New', monospace;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .submit-btn {
            width: 100%;
            padding: 0.875rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.9375rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .submit-btn:hover:not(:disabled) {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .response-section {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .response-section.show {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden {
            display: none;
        }

        /* ================================================================
           Rich Response Styles (ported from knowledge.html + new)
           ================================================================ */

        .answer-card {
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: var(--shadow);
            margin-bottom: 1.5rem;
        }

        .answer-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .answer-card-header h3 {
            font-size: 1.125rem;
            font-weight: 600;
        }

        .answer-text {
            font-size: 0.9375rem;
            line-height: 1.8;
            color: var(--text-primary);
        }

        .answer-text p { margin-bottom: 1rem; }
        .answer-text p:last-child { margin-bottom: 0; }
        .answer-text strong { font-weight: 600; color: var(--text-primary); }
        .answer-text em { font-style: italic; }

        .answer-text h3 {
            font-size: 1.05rem;
            font-weight: 700;
            margin: 1.25rem 0 0.5rem;
            color: var(--text-primary);
        }
        .answer-text h3:first-child { margin-top: 0; }

        .answer-text h4 {
            font-size: 0.975rem;
            font-weight: 600;
            margin: 1rem 0 0.375rem;
            color: var(--text-primary);
        }

        .answer-text ul, .answer-text ol {
            margin: 0.5rem 0 1rem 1.5rem;
            padding: 0;
        }

        .answer-text li {
            margin-bottom: 0.375rem;
            line-height: 1.7;
        }

        .answer-text li::marker { color: var(--primary); }

        .answer-text code {
            background: var(--bg-secondary);
            padding: 0.125rem 0.375rem;
            border-radius: 4px;
            font-size: 0.85em;
            font-family: 'Monaco', 'Courier New', monospace;
        }

        .answer-text hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 1rem 0;
        }

        /* Decision badge */
        .decision-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.375rem 1rem;
            border-radius: 20px;
            font-size: 0.8125rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .decision-badge.can_proceed {
            background: var(--success-light);
            color: #065f46;
        }

        .decision-badge.uncertain {
            background: var(--warning-light);
            color: #92400e;
        }

        .decision-badge.out_of_scope {
            background: var(--error-light);
            color: #991b1b;
        }

        /* Outcome badge */
        .outcome-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .outcome-badge.can_proceed { background: var(--success-light); color: #065f46; }
        .outcome-badge.blocked_not_eligible { background: var(--error-light); color: #991b1b; }
        .outcome-badge.blocked_missing_data { background: var(--warning-light); color: #92400e; }
        .outcome-badge.ambiguous_plan_rules { background: #ede9fe; color: #5b21b6; }

        /* Confidence bar */
        .confidence-bar-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .confidence-bar {
            flex: 1;
            height: 8px;
            background: var(--bg-secondary);
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .confidence-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.6s ease-out;
        }

        .confidence-bar-fill.high { background: var(--success); }
        .confidence-bar-fill.medium { background: var(--warning); }
        .confidence-bar-fill.low { background: var(--error); }

        .confidence-value {
            font-size: 0.9375rem;
            font-weight: 700;
            font-family: 'Monaco', 'Courier New', monospace;
            min-width: 3.5rem;
            text-align: right;
        }

        .confidence-value.high { color: #065f46; }
        .confidence-value.medium { color: #92400e; }
        .confidence-value.low { color: #991b1b; }

        /* Coverage badge (well_covered, partially_covered, limited_coverage) */
        .coverage-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .coverage-badge.well_covered { background: var(--success-light); color: #065f46; }
        .coverage-badge.partially_covered { background: var(--warning-light); color: #92400e; }
        .coverage-badge.limited_coverage { background: var(--error-light); color: #991b1b; }

        /* Key points */
        .key-points-list {
            list-style: none;
            padding: 0;
            margin-top: 0.5rem;
        }

        .key-points-list li {
            padding: 0.625rem 0.875rem 0.625rem 2rem;
            position: relative;
            font-size: 0.9375rem;
            border-bottom: 1px solid var(--bg-secondary);
        }

        .key-points-list li:last-child { border-bottom: none; }

        .key-points-list li::before {
            content: '';
            position: absolute;
            left: 0.5rem;
            top: 1rem;
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
        }

        /* Required fields table */
        .fields-category {
            margin-bottom: 1.5rem;
        }

        .fields-category:last-child { margin-bottom: 0; }

        .fields-category-header {
            font-size: 0.9375rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 0.75rem;
            text-transform: capitalize;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .fields-category-count {
            font-size: 0.6875rem;
            font-weight: 700;
            color: var(--text-muted);
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 0.125rem 0.5rem;
            border-radius: 10px;
        }

        .field-row {
            padding: 0.875rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 0.5rem;
        }

        .field-row:last-child { margin-bottom: 0; }

        .field-row-top {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 0.375rem;
        }

        .field-name {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-primary);
            font-family: 'Monaco', 'Courier New', monospace;
        }

        .field-pill {
            display: inline-block;
            font-size: 0.625rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 0.125rem 0.5rem;
            border-radius: 4px;
        }

        .field-pill.required { background: var(--error-light); color: #991b1b; border: 1px solid #fca5a5; }
        .field-pill.optional { background: var(--bg-primary); color: var(--text-muted); border: 1px solid var(--border); }
        .field-pill.type { background: var(--primary-light); color: var(--primary); border: 1px solid #c7d2fe; }

        .field-description {
            font-size: 0.8125rem;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
        }

        .field-why {
            font-size: 0.8125rem;
            color: var(--text-muted);
            font-style: italic;
        }

        /* Steps */
        .steps-list {
            list-style: none;
            padding: 0;
            counter-reset: step-counter;
        }

        .step-item {
            display: flex;
            gap: 1rem;
            padding: 0.875rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 0.5rem;
        }

        .step-item:last-child { margin-bottom: 0; }

        .step-number {
            flex-shrink: 0;
            width: 2rem;
            height: 2rem;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8125rem;
            font-weight: 700;
        }

        .step-content { flex: 1; }

        .step-action {
            font-size: 0.9375rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .step-detail {
            font-size: 0.8125rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* Warnings */
        .warnings-list {
            list-style: none;
            padding: 0;
        }

        .warnings-list li {
            padding: 0.625rem 0.875rem 0.625rem 2.25rem;
            position: relative;
            font-size: 0.9375rem;
            color: #92400e;
            background: var(--warning-light);
            border-radius: 6px;
            margin-bottom: 0.5rem;
            border: 1px solid #fde68a;
        }

        .warnings-list li:last-child { margin-bottom: 0; }

        .warnings-list li::before {
            content: '!';
            position: absolute;
            left: 0.625rem;
            top: 0.5rem;
            width: 1.25rem;
            height: 1.25rem;
            background: var(--warning);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6875rem;
            font-weight: 700;
        }

        /* Questions to ask */
        .question-item {
            padding: 0.875rem 1rem;
            background: var(--primary-light);
            border: 1px solid #c7d2fe;
            border-radius: 8px;
            margin-bottom: 0.5rem;
        }

        .question-item:last-child { margin-bottom: 0; }

        .question-text {
            font-size: 0.9375rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 0.25rem;
        }

        .question-why {
            font-size: 0.8125rem;
            color: var(--text-secondary);
            font-style: italic;
        }

        /* Escalation */
        .escalation-card {
            background: var(--error-light);
            border: 1px solid #fca5a5;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--error);
        }

        .escalation-card h3 { color: #991b1b; margin-bottom: 0.5rem; }
        .escalation-card p { color: #991b1b; font-size: 0.9375rem; }

        /* Guardrails */
        .guardrails-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.375rem;
        }

        .guardrail-pill {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            background: #ede9fe;
            color: #5b21b6;
            border: 1px solid #c4b5fd;
        }

        /* Data gaps */
        .data-gaps-card {
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: var(--shadow);
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--secondary);
        }

        .data-gaps-list {
            list-style: none;
            padding: 0;
            margin-top: 0.5rem;
        }

        .data-gaps-list li {
            padding: 0.5rem 0.75rem 0.5rem 2rem;
            position: relative;
            font-size: 0.9375rem;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--bg-secondary);
        }

        .data-gaps-list li:last-child { border-bottom: none; }

        .data-gaps-list li::before {
            content: '';
            position: absolute;
            left: 0.5rem;
            top: 0.875rem;
            width: 10px;
            height: 10px;
            border: 2px solid var(--secondary);
            border-radius: 50%;
            background: var(--bg-secondary);
        }

        /* Coverage Gaps */
        .coverage-gaps-card {
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: var(--shadow);
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--warning);
        }

        .coverage-gaps-list {
            list-style: none;
            padding: 0;
            margin-top: 0.5rem;
        }

        .coverage-gaps-list li {
            padding: 0.5rem 0.75rem 0.5rem 2rem;
            position: relative;
            font-size: 0.9375rem;
            color: #92400e;
            border-bottom: 1px solid var(--warning-light);
        }

        .coverage-gaps-list li:last-child { border-bottom: none; }

        .coverage-gaps-list li::before {
            content: '';
            position: absolute;
            left: 0.5rem;
            top: 0.875rem;
            width: 10px;
            height: 10px;
            border: 2px solid var(--warning);
            border-radius: 50%;
            background: var(--warning-light);
        }

        /* Source Articles */
        .source-articles {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 0.75rem;
            margin-top: 0.5rem;
        }

        .source-card {
            padding: 0.875rem 1rem;
            background: var(--bg-secondary);
            border-radius: 8px;
            border: 1px solid var(--border);
            transition: opacity 0.15s;
        }

        .source-card.source-used {
            border-color: var(--primary);
            border-width: 1.5px;
        }

        .source-card.source-consulted {
            opacity: 0.55;
            border-style: dashed;
        }

        .source-card .source-article-name {
            font-size: 0.8125rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 0.375rem;
            line-height: 1.4;
        }

        .source-card.source-consulted .source-article-name { color: var(--text-secondary); }

        .source-info-badge {
            display: inline-block;
            font-size: 0.625rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 0.125rem 0.5rem;
            border-radius: 4px;
            margin-bottom: 0.375rem;
        }

        .source-info-badge.badge-used { color: #1a7f37; background: #dafbe1; border: 1px solid #aceebb; }

        /* Responsive */

            .container { padding: 1rem; }

            .endpoint-selector { flex-direction: column; }
            .source-articles { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <h1>KB RAG System</h1>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <button onclick="window.location.href='/ui/knowledge'" style="text-decoration: none; color: var(--primary); font-weight: 500; padding: 0.5rem 1rem; border-radius: 6px; background: var(--primary-light); transition: all 0.2s; border: none; cursor: pointer; font-family: inherit; font-size: inherit;" onmouseover="this.style.background='var(--primary)'; this.style.color='white';" onmouseout="this.style.background='var(--primary-light)'; this.style.color='var(--primary)';">
                    Knowledge Q&A
                </button>
                <button onclick="window.location.href='/ui/chunks'" style="text-decoration: none; color: var(--primary); font-weight: 500; padding: 0.5rem 1rem; border-radius: 6px; background: var(--primary-light); transition: all 0.2s; border: none; cursor: pointer; font-family: inherit; font-size: inherit;" onmouseover="this.style.background='var(--primary)'; this.style.color='white';" onmouseout="this.style.background='var(--primary-light)'; this.style.color='var(--primary)';">
                    View Chunks
                </button>
                <div id="statusBadge" class="status-badge unhealthy">
                    <div class="status-dot"></div>
                    <span>Checking...</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <div class="container">
        <!-- Configuration Section -->
        <section class="config-section">
            <h2>Configuration</h2>
            <div class="config-grid">
                <div class="form-group">
                    <label for="apiUrl">API URL</label>
                    <input type="text" id="apiUrl" value="http://localhost:8000" placeholder="http://localhost:8000" readonly>
                </div>
                <div class="form-group">
                    <label for="apiKey">API Key</label>
                    <input type="password" id="apiKey" placeholder="Enter your API key">
                </div>
            </div>
        </section>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Left Panel: Form -->
            <div class="panel">
                <div class="panel-header">
                    <h2>Request</h2>
                    <p>Select an endpoint and fill in the required fields</p>
                </div>

                <!-- Endpoint Selector -->
                <div class="endpoint-selector">
                    <button class="endpoint-btn active" data-endpoint="required-data">
                        Required Data
                    </button>
                    <button class="endpoint-btn" data-endpoint="generate-response">
                        Generate Response
                    </button>
                </div>

                <!-- Dynamic Form -->
                <form id="dynamicForm">
                    <div id="formFields"></div>
                    <button type="submit" class="submit-btn" id="submitBtn">
                        <span>Send Request</span>
                    </button>
                </form>
            </div>

            <!-- Right Panel: Payload Preview -->
            <div class="panel">
                <div class="panel-header">
                    <h2>Request Payload</h2>
                    <p>Live preview of the JSON payload</p>
                </div>

                <div class="code-preview">
                    <div class="code-preview-header">
                        <span>JSON</span>
                        <button type="button" class="copy-btn" onclick="copyPayload()">Copy</button>
                    </div>
                    <pre id="payloadPreview">{}</pre>
                </div>
            </div>
        </div>

        <!-- Response Section -->
        <section id="responseSection" class="response-section">
            <div id="responseContent"></div>
        </section>
    </div>

    <script>
        // ================================================================
        // Field definitions for each endpoint
        // ================================================================
        const fieldDefinitions = {
            'required-data': [
                {
                    name: 'inquiry',
                    label: 'Inquiry',
                    type: 'textarea',
                    description: 'The participant\'s question or request',
                    placeholder: 'Example: I want to rollover my 401k to Fidelity',
                    required: true
                },
                {
                    name: 'record_keeper',
                    label: 'Record Keeper',
                    type: 'text',
                    description: 'The record keeper managing the plan',
                    placeholder: 'Example: LT Trust, Vanguard, Fidelity',
                    required: true
                },
                {
                    name: 'plan_type',
                    label: 'Plan Type',
                    type: 'select',
                    description: 'Type of retirement plan',
                    options: ['401(k)', '403(b)', '457'],
                    value: '401(k)',
                    required: true
                },
                {
                    name: 'topic',
                    label: 'Topic',
                    type: 'text',
                    description: 'Main topic of the inquiry',
                    placeholder: 'Example: rollover, distribution, loan, hardship',
                    required: true
                }
            ],
            'generate-response': [
                {
                    name: 'inquiry',
                    label: 'Inquiry',
                    type: 'textarea',
                    description: 'The participant\'s question or request',
                    placeholder: 'Example: How do I complete a direct rollover?',
                    required: true
                },
                {
                    name: 'record_keeper',
                    label: 'Record Keeper',
                    type: 'text',
                    description: 'The record keeper managing the plan',
                    placeholder: 'Example: LT Trust',
                    required: true
                },
                {
                    name: 'plan_type',
                    label: 'Plan Type',
                    type: 'select',
                    description: 'Type of retirement plan',
                    options: ['401(k)', '403(b)', '457'],
                    value: '401(k)',
                    required: true
                },
                {
                    name: 'topic',
                    label: 'Topic',
                    type: 'text',
                    description: 'Main topic of the inquiry',
                    placeholder: 'Example: rollover',
                    required: true
                },
                {
                    name: 'collected_data',
                    label: 'Collected Data',
                    type: 'textarea',
                    description: 'JSON object with participant and plan data',
                    value: '{\n  "participant_data": {\n    "termination_date": "2024-11-01",\n    "rehire_date": null,\n    "balance": 2000.00,\n    "status": "Terminated",\n    "last_payroll_date": "2024-11-15"\n  },\n  "plan_data": {}\n}',
                    required: true,
                    isJson: true
                },
                {
                    name: 'max_response_tokens',
                    label: 'Max Response Tokens',
                    type: 'number',
                    description: 'Maximum tokens for the response (500-5000)',
                    placeholder: '5000',
                    min: 500,
                    max: 5000,
                    value: 5000
                },
                {
                    name: 'total_inquiries_in_ticket',
                    label: 'Total Inquiries in Ticket',
                    type: 'number',
                    description: 'Number of inquiries in the ticket (1-10)',
                    placeholder: '2',
                    min: 1,
                    max: 10,
                    value: 2
                }
            ]
        };

        let currentEndpoint = 'required-data';
        let formData = {};

        // ================================================================
        // Initialize
        // ================================================================
        document.addEventListener('DOMContentLoaded', () => {
            const apiUrlInput = document.getElementById('apiUrl');
            if (window.location.protocol === 'http:' || window.location.protocol === 'https:') {
                apiUrlInput.value = window.location.origin;
            }

            checkHealth();
            renderForm();
            setupEventListeners();
            updatePayloadPreview();
        });

        function setupEventListeners() {
            document.querySelectorAll('.endpoint-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.endpoint-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentEndpoint = e.target.dataset.endpoint;
                    formData = {};
                    renderForm();
                    updatePayloadPreview();
                });
            });

            document.getElementById('dynamicForm').addEventListener('submit', handleSubmit);
        }

        // ================================================================
        // Form rendering (unchanged)
        // ================================================================
        function renderForm() {
            const container = document.getElementById('formFields');
            const fields = fieldDefinitions[currentEndpoint];

            container.innerHTML = '';

            fields.forEach(field => {
                const formGroup = document.createElement('div');
                formGroup.className = 'form-group';

                const label = document.createElement('label');
                label.textContent = field.label;
                if (field.required) {
                    label.innerHTML += ' <span style="color: var(--error);">*</span>';
                }

                const description = document.createElement('div');
                description.className = 'description';
                description.textContent = field.description;

                let input;

                if (field.type === 'textarea') {
                    input = document.createElement('textarea');
                    input.placeholder = field.placeholder || '';
                    input.rows = field.isJson ? 8 : 3;
                    if (field.value) input.value = field.value;
                } else if (field.type === 'select') {
                    input = document.createElement('select');
                    field.options.forEach(option => {
                        const opt = document.createElement('option');
                        opt.value = option;
                        opt.textContent = option;
                        if (field.value && option === field.value) opt.selected = true;
                        input.appendChild(opt);
                    });
                } else {
                    input = document.createElement('input');
                    input.type = field.type;
                    input.placeholder = field.placeholder || '';
                    if (field.type === 'number') {
                        input.min = field.min;
                        input.max = field.max;
                        input.value = field.value || '';
                    }
                }

                input.name = field.name;
                input.id = field.name;
                if (field.required) input.required = true;

                input.addEventListener('input', () => {
                    updateFormData(field.name, input.value, field.isJson);
                });

                formGroup.appendChild(label);
                formGroup.appendChild(description);
                formGroup.appendChild(input);
                container.appendChild(formGroup);

                if (field.value) {
                    updateFormData(field.name, field.value, field.isJson);
                }
            });
        }

        function updateFormData(fieldName, value, isJson = false) {
            if (isJson) {
                if (value.trim()) {
                    try { formData[fieldName] = JSON.parse(value); }
                    catch (e) { formData[fieldName] = value; }
                } else {
                    formData[fieldName] = {};
                }
            } else if (value.trim()) {
                const num = Number(value);
                formData[fieldName] = !isNaN(num) && value.trim() !== '' &&
                                      (fieldName.includes('token') || fieldName.includes('inquiries'))
                                      ? num : value;
            } else {
                delete formData[fieldName];
            }
            updatePayloadPreview();
        }

        function updatePayloadPreview() {
            document.getElementById('payloadPreview').textContent = JSON.stringify(formData, null, 2);
        }

        // ================================================================
        // Submit handler
        // ================================================================
        async function handleSubmit(e) {
            e.preventDefault();

            const apiUrl = document.getElementById('apiUrl').value;
            const apiKey = document.getElementById('apiKey').value;

            if (!apiKey) {
                alert('Please enter your API Key in the configuration section');
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<div class="spinner"></div><span>Processing...</span>';

            const endpoint = currentEndpoint === 'required-data'
                ? '/api/v1/required-data'
                : '/api/v1/generate-response';

            try {
                const response = await fetch(`${apiUrl}${endpoint}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': apiKey
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();
                showResponse(data, response.ok);
            } catch (error) {
                showResponse({ error: error.message }, false);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>Send Request</span>';
            }
        }

        // ================================================================
        // Response dispatcher
        // ================================================================
        function showResponse(data, success) {
            const section = document.getElementById('responseSection');
            const content = document.getElementById('responseContent');

            if (!success) {
                content.innerHTML = renderError(data);
            } else if (currentEndpoint === 'required-data') {
                content.innerHTML = renderRequiredDataResponse(data);
            } else {
                content.innerHTML = renderGenerateResponse(data);
            }

            section.classList.add('show');
            section.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // ================================================================
        // Helper functions
        // ================================================================
        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function renderInline(str) {
            if (!str) return '';
            let text = escapeHtml(str);
            text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/__(.+?)__/g, '<strong>$1</strong>');
            text = text.replace(/(?<!\w)\*([^*]+?)\*(?!\w)/g, '<em>$1</em>');
            text = text.replace(/(?<!\w)_([^_]+?)_(?!\w)/g, '<em>$1</em>');
            text = text.replace(/`([^`]+?)`/g, '<code>$1</code>');
            return text;
        }

        function renderMarkdown(str) {
            if (!str) return '';
            let text = escapeHtml(str);
            text = text.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
            text = text.replace(/^### (.+)$/gm, '<h4>$1</h4>');
            text = text.replace(/^## (.+)$/gm, '<h3>$1</h3>');
            text = text.replace(/^# (.+)$/gm, '<h3>$1</h3>');
            text = text.replace(/^---+$/gm, '<hr>');
            text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/__(.+?)__/g, '<strong>$1</strong>');
            text = text.replace(/(?<!\w)\*([^*]+?)\*(?!\w)/g, '<em>$1</em>');
            text = text.replace(/(?<!\w)_([^_]+?)_(?!\w)/g, '<em>$1</em>');
            text = text.replace(/`([^`]+?)`/g, '<code>$1</code>');
            text = text.replace(
                /(^|\n)((?:[ \t]*[-*] .+(?:\n|$))+)/g,
                function(match, prefix, block) {
                    const items = block.trim().split('\n')
                        .map(line => line.replace(/^[ \t]*[-*] /, '').trim())
                        .filter(Boolean)
                        .map(item => `<li>${item}</li>`).join('');
                    return `${prefix}<ul>${items}</ul>`;
                }
            );
            text = text.replace(
                /(^|\n)((?:[ \t]*\d+\. .+(?:\n|$))+)/g,
                function(match, prefix, block) {
                    const items = block.trim().split('\n')
                        .map(line => line.replace(/^[ \t]*\d+\. /, '').trim())
                        .filter(Boolean)
                        .map(item => `<li>${item}</li>`).join('');
                    return `${prefix}<ol>${items}</ol>`;
                }
            );
            const blocks = text.split(/\n{2,}/);
            text = blocks.map(block => {
                block = block.trim();
                if (!block) return '';
                if (/^<(h[1-6]|ul|ol|hr|p|div|blockquote)/.test(block)) return block;
                return `<p>${block}</p>`;
            }).join('\n');
            text = text.replace(/<p>([\s\S]*?)<\/p>/g, function(match, inner) {
                return '<p>' + inner.replace(/\n/g, '<br>') + '</p>';
            });
            return text;
        }

        function formatChunkType(raw) {
            if (!raw) return '';
            const labels = {
                'faqs': 'FAQ',
                'business_rules': 'Business Rules',
                'eligibility': 'Eligibility',
                'steps': 'Steps / Process',
                'common_issues': 'Common Issues',
                'decision_guide': 'Decision Guide',
                'required_data_must_have': 'Required Data',
                'required_data_nice_to_have': 'Additional Data',
                'content': 'Content',
                'guardrails': 'Guardrails',
                'fees_details': 'Fees Details',
                'example': 'Example',
                'definitions': 'Definitions',
                'additional_notes': 'Additional Notes'
            };
            return labels[raw] || raw.replace(/_/g, ' ');
        }

        function formatCategoryName(raw) {
            if (!raw) return '';
            return raw.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        }

        function groupChunksByArticle(chunks) {
            const map = {};
            const order = [];
            for (const uc of chunks) {
                if (!map[uc.article_id]) {
                    map[uc.article_id] = { article_id: uc.article_id, article_title: uc.article_title, chunks: [] };
                    order.push(uc.article_id);
                }
                map[uc.article_id].chunks.push(uc);
            }
            return order.map(id => map[id]);
        }

        function confidenceLevel(val) {
            if (val >= 0.7) return 'high';
            if (val >= 0.5) return 'medium';
            return 'low';
        }

        function scoreClass(val) {
            if (val >= 0.35) return 'good';
            if (val >= 0.22) return 'fair';
            return 'weak';
        }

        function toggleRawJson(id) {
            document.getElementById(id).classList.toggle('show');
        }

        function toggleChunksSection(toggleId, bodyId) {
            document.getElementById(toggleId).classList.toggle('open');
            document.getElementById(bodyId).classList.toggle('open');
        }

        function toggleArticleGroup(groupId, headerEl) {
            document.getElementById(groupId).classList.toggle('open');
            headerEl.classList.toggle('open');
        }

        function toggleChunkContent(contentId, btn) {
            const el = document.getElementById(contentId);
            const isOpen = el.classList.toggle('open');
            btn.textContent = isOpen ? 'Hide full content' : 'Show full content';
        }

        function copyRawJson(id) {
            const text = document.querySelector(`#${id} pre`).textContent;
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.target;
                const orig = btn.textContent;
                btn.textContent = 'Copied!';
                setTimeout(() => btn.textContent = orig, 2000);
            });
        }

        // ================================================================
        // Shared renderers (source articles, chunks, strategy, etc.)
        // ================================================================
        function renderConfidenceBar(value) {
            const pct = Math.round(value * 100);
            const level = confidenceLevel(value);
            return `
                <div class="confidence-bar-container">
                    <div class="confidence-bar">
                        <div class="confidence-bar-fill ${level}" style="width: ${pct}%"></div>
                    </div>
                    <span class="confidence-value ${level}">${value.toFixed(3)}</span>
                </div>
            `;
        }

        function renderSourceArticles(sourceArticles, metadata) {
            if (!sourceArticles || sourceArticles.length === 0) return '';
            const m = metadata || {};
            const totalArticles = m.unique_articles ?? sourceArticles.length;
            const relevantArticles = m.relevant_articles ?? sourceArticles.filter(sa => sa.used_info).length;
            const subtitle = `${totalArticles} consulted · ${relevantArticles} relevant`;

            return `
                <div class="answer-card">
                    <div class="answer-card-header">
                        <h3>Source Articles</h3>
                        <span style="font-size:0.8125rem;color:var(--text-muted);">${subtitle}</span>
                    </div>
                    <div class="source-articles">
                        ${sourceArticles.map(sa => {
                            const isUsed = sa.used_info === true;
                            const cardClass = isUsed ? 'source-used' : 'source-consulted';
                            const badgeClass = isUsed ? 'badge-used' : 'badge-consulted';
                            const badgeLabel = isUsed ? 'Info used' : 'Consulted';
                            const types = (sa.chunk_types_used || '').split(',').map(t => t.trim()).filter(Boolean);
                            const typeBadges = types.length > 0
                                ? `<div class="source-types-row">${types.map(t => `<span class="source-type-badge">${escapeHtml(formatChunkType(t))}</span>`).join('')}</div>`
                                : '';
                            return `
                                <div class="source-card ${cardClass}">
                                    <span class="source-info-badge ${badgeClass}">${badgeLabel}</span>
                                    <div class="source-article-name">${escapeHtml(sa.article_title || 'Unknown Article')}</div>
                                    ${typeBadges}
                                    <div class="source-relevance">${escapeHtml(sa.relevance || '')}</div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        function renderUsedChunks(usedChunks, prefix) {
            if (!usedChunks || usedChunks.length === 0) return '';
            const grouped = groupChunksByArticle(usedChunks);
            const toggleId = `${prefix}-chunksToggle`;
            const bodyId = `${prefix}-chunksBody`;

            const articleGroupsHtml = grouped.map((group, gi) => {
                const chunksInGroup = group.chunks.map((uc, ci) => {
                    const sClass = scoreClass(uc.score);
                    const contentId = `${prefix}-chunk-${gi}-${ci}`;
                    return `
                        <div class="chunk-card">
                            <div class="chunk-card-header">
                                <span class="chunk-score ${sClass}">${uc.score.toFixed(4)}</span>
                                <span class="chunk-type-pill">${escapeHtml(formatChunkType(uc.chunk_type))}</span>
                                <span class="chunk-tier-pill ${uc.chunk_tier}">${escapeHtml(uc.chunk_tier)}</span>
                                <span class="chunk-id" title="${escapeHtml(uc.chunk_id)}">${escapeHtml(uc.chunk_id)}</span>
                            </div>
                            <div class="chunk-preview">${escapeHtml(uc.content_preview)}</div>
                            <button class="chunk-expand-btn" onclick="toggleChunkContent('${contentId}', this)">Show full content</button>
                            <div id="${contentId}" class="chunk-full-content">${escapeHtml(uc.content)}</div>
                        </div>
                    `;
                }).join('');

                const groupId = `${prefix}-group-${gi}`;
                return `
                    <div class="article-group">
                        <div class="article-group-header" onclick="toggleArticleGroup('${groupId}', this)">
                            <span class="group-arrow">&#9654;</span>
                            <span class="article-group-title">${escapeHtml(group.article_title)}</span>
                            <span class="article-group-count">${group.chunks.length} chunk${group.chunks.length > 1 ? 's' : ''}</span>
                        </div>
                        <div id="${groupId}" class="article-group-chunks">
                            ${chunksInGroup}
                        </div>
                    </div>
                `;
            }).join('');

            return `
                <button class="chunks-section-toggle" id="${toggleId}" onclick="toggleChunksSection('${toggleId}', '${bodyId}')">
                    <span>Used Chunks (${usedChunks.length})</span>
                    <span class="toggle-arrow">&#9654;</span>
                </button>
                <div id="${bodyId}" class="chunks-section-body">
                    ${articleGroupsHtml}
                </div>
            `;
        }

        function renderCoverageGaps(gaps) {
            if (!gaps || gaps.length === 0) return '';
            return `
                <div class="coverage-gaps-card">
                    <div class="answer-card-header" style="border-bottom-color: var(--warning-light);">
                        <h3>Coverage Gaps</h3>
                        <span class="coverage-badge limited_coverage">${gaps.length} topic${gaps.length > 1 ? 's' : ''} not covered</span>
                    </div>
                    <ul class="coverage-gaps-list">
                        ${gaps.map(g => `<li>${escapeHtml(g)}</li>`).join('')}
                    </ul>
                </div>
            `;
        }

        function renderSearchStrategy(metadata) {
            const m = metadata || {};
            const subQueries = m.sub_queries || [];
            const perQueryScores = m.per_query_scores || {};
            if (subQueries.length === 0) return '';

            return `
                <div class="strategy-card">
                    <div class="answer-card-header">
                        <h3>Search Strategy</h3>
                        <span style="font-size:0.8125rem;color:var(--text-muted);">${subQueries.length} sub-quer${subQueries.length > 1 ? 'ies' : 'y'}</span>
                    </div>
                    <div class="sub-queries-list">
                        ${subQueries.map(sq => {
                            const score = perQueryScores[sq];
                            const scoreDisplay = score != null ? score.toFixed(4) : '\u2014';
                            const sc = score != null ? scoreClass(score) : '';
                            return `
                                <div class="sub-query-row">
                                    <span class="sub-query-text">"${escapeHtml(sq)}"</span>
                                    <span class="sub-query-score ${sc}">${scoreDisplay}</span>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        function renderMetadata(metadata, extraItems) {
            const m = metadata || {};
            const parts = [];
            if (m.chunks_used != null) parts.push(`<div class="metadata-item"><strong>Chunks:</strong> ${m.chunks_used}</div>`);
            if (m.unique_articles != null) parts.push(`<div class="metadata-item"><strong>Articles:</strong> ${m.unique_articles}</div>`);
            if (m.context_tokens != null) parts.push(`<div class="metadata-item"><strong>Context tokens:</strong> ${m.context_tokens}</div>`);
            if (m.tokens_used != null && m.context_tokens == null) parts.push(`<div class="metadata-item"><strong>Tokens used:</strong> ${m.tokens_used}</div>`);
            if (m.response_tokens != null) parts.push(`<div class="metadata-item"><strong>Response tokens:</strong> ${m.response_tokens}</div>`);
            if (m.model) parts.push(`<div class="metadata-item"><strong>Model:</strong> ${m.model}</div>`);
            if (m.total_inquiries != null) parts.push(`<div class="metadata-item"><strong>Inquiries in ticket:</strong> ${m.total_inquiries}</div>`);
            if (extraItems) parts.push(...extraItems);
            if (parts.length === 0) return '';
            return `<div class="metadata-row">${parts.join('')}</div>`;
        }

        function renderRawJsonToggle(data, id) {
            return `
                <div class="raw-toggle">
                    <button onclick="toggleRawJson('${id}')">Show Raw JSON</button>
                </div>
                <div id="${id}" class="raw-json">
                    <div style="display:flex;justify-content:flex-end;margin-bottom:0.5rem;">
                        <button class="copy-btn" onclick="copyRawJson('${id}')">Copy</button>
                    </div>
                    <pre>${escapeHtml(JSON.stringify(data, null, 2))}</pre>
                </div>
            `;
        }

        // ================================================================
        // Required Data Response Renderer
        // ================================================================
        function renderRequiredDataResponse(data) {
            const m = data.metadata || {};

            // Confidence bar
            const confidenceHtml = `
                <div class="answer-card">
                    <div class="answer-card-header">
                        <h3>Required Data Analysis</h3>
                        <span style="font-size:0.8125rem;color:var(--text-muted);">Confidence</span>
                    </div>
                    ${renderConfidenceBar(data.confidence || 0)}
                    ${renderMetadata(m)}
                </div>
            `;

            // Article reference
            let articleRefHtml = '';
            if (data.article_reference) {
                const ref = data.article_reference;
                articleRefHtml = `
                    <div class="article-ref-card">
                        <div style="flex:1;">
                            <div class="article-ref-title">${escapeHtml(ref.title || 'Unknown Article')}</div>
                            <div class="article-ref-id" title="${escapeHtml(ref.article_id || '')}">${escapeHtml(ref.article_id || '')}</div>
                        </div>
                        <span class="confidence-value ${confidenceLevel(ref.confidence || 0)}">${(ref.confidence || 0).toFixed(3)}</span>
                    </div>
                `;
            }

            // Required fields by category
            let fieldsHtml = '';
            if (data.required_fields && Object.keys(data.required_fields).length > 0) {
                const categories = Object.entries(data.required_fields);
                fieldsHtml = `
                    <div class="answer-card">
                        <div class="answer-card-header">
                            <h3>Required Fields</h3>
                            <span style="font-size:0.8125rem;color:var(--text-muted);">${categories.reduce((sum, [, fields]) => sum + fields.length, 0)} fields</span>
                        </div>
                        ${articleRefHtml}
                        ${categories.map(([category, fields]) => `
                            <div class="fields-category">
                                <div class="fields-category-header">
                                    ${escapeHtml(formatCategoryName(category))}
                                    <span class="fields-category-count">${fields.length}</span>
                                </div>
                                ${fields.map(f => `
                                    <div class="field-row">
                                        <div class="field-row-top">
                                            <span class="field-name">${escapeHtml(f.field)}</span>
                                            <span class="field-pill type">${escapeHtml(f.data_type)}</span>
                                            <span class="field-pill ${f.required ? 'required' : 'optional'}">${f.required ? 'Required' : 'Optional'}</span>
                                        </div>
                                        <div class="field-description">${escapeHtml(f.description)}</div>
                                        <div class="field-why">${escapeHtml(f.why_needed)}</div>
                                    </div>
                                `).join('')}
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            const coverageGapsHtml = renderCoverageGaps(data.coverage_gaps);
            const sourceArticlesHtml = renderSourceArticles(data.source_articles, m);
            const usedChunksHtml = renderUsedChunks(data.used_chunks, 'rd');
            const strategyHtml = renderSearchStrategy(m);
            const rawJsonHtml = renderRawJsonToggle(data, 'rdRawJson');

            return confidenceHtml + fieldsHtml + coverageGapsHtml + sourceArticlesHtml + usedChunksHtml + strategyHtml + rawJsonHtml;
        }

        // ================================================================
        // Generate Response Renderer
        // ================================================================
        function renderGenerateResponse(data) {
            const m = data.metadata || {};
            const resp = data.response || {};
            const rtp = resp.response_to_participant || {};

            // Decision + Confidence header
            const decisionClass = data.decision || 'uncertain';
            const decisionLabel = (data.decision || 'unknown').replace(/_/g, ' ');
            const headerHtml = `
                <div class="answer-card">
                    <div class="answer-card-header">
                        <h3>RAG Decision</h3>
                        <span class="decision-badge ${decisionClass}">${decisionLabel}</span>
                    </div>
                    ${renderConfidenceBar(data.confidence || 0)}
                    ${renderMetadata(m)}
                </div>
            `;

            // Outcome card
            let outcomeHtml = '';
            if (resp.outcome) {
                const outcomeClass = resp.outcome || '';
                const outcomeLabel = (resp.outcome || '').replace(/_/g, ' ');
                outcomeHtml = `
                    <div class="answer-card">
                        <div class="answer-card-header">
                            <h3>Participant Outcome</h3>
                            <span class="outcome-badge ${outcomeClass}">${outcomeLabel}</span>
                        </div>
                        ${resp.outcome_reason ? `<p style="font-size:0.9375rem;color:var(--text-secondary);line-height:1.7;">${renderInline(resp.outcome_reason)}</p>` : ''}
                    </div>
                `;
            }

            // Response to Participant
            let responseToParticipantHtml = '';
            if (rtp.opening || (rtp.key_points && rtp.key_points.length) || (rtp.steps && rtp.steps.length) || (rtp.warnings && rtp.warnings.length)) {
                let openingHtml = '';
                if (rtp.opening) {
                    openingHtml = `<div class="opening-text">${renderInline(rtp.opening)}</div>`;
                }

                let keyPointsHtml = '';
                if (rtp.key_points && rtp.key_points.length > 0) {
                    keyPointsHtml = `
                        <h4 style="font-size:0.9375rem;font-weight:600;margin-bottom:0.5rem;margin-top:0.5rem;">Key Points</h4>
                        <ul class="key-points-list">
                            ${rtp.key_points.map(kp => `<li>${renderInline(kp)}</li>`).join('')}
                        </ul>
                    `;
                }

                let stepsHtml = '';
                if (rtp.steps && rtp.steps.length > 0) {
                    stepsHtml = `
                        <h4 style="font-size:0.9375rem;font-weight:600;margin:1rem 0 0.5rem;">Steps</h4>
                        <div class="steps-list">
                            ${rtp.steps.map(s => `
                                <div class="step-item">
                                    <div class="step-number">${s.step_number}</div>
                                    <div class="step-content">
                                        <div class="step-action">${renderInline(s.action)}</div>
                                        ${s.detail ? `<div class="step-detail">${renderInline(s.detail)}</div>` : ''}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }

                let warningsHtml = '';
                if (rtp.warnings && rtp.warnings.length > 0) {
                    warningsHtml = `
                        <h4 style="font-size:0.9375rem;font-weight:600;margin:1rem 0 0.5rem;">Warnings</h4>
                        <ul class="warnings-list">
                            ${rtp.warnings.map(w => `<li>${renderInline(w)}</li>`).join('')}
                        </ul>
                    `;
                }

                responseToParticipantHtml = `
                    <div class="answer-card">
                        <div class="answer-card-header">
                            <h3>Response to Participant</h3>
                        </div>
                        ${openingHtml}
                        ${keyPointsHtml}
                        ${stepsHtml}
                        ${warningsHtml}
                    </div>
                `;
            }

            // Questions to Ask
            let questionsHtml = '';
            const questions = resp.questions_to_ask || [];
            if (questions.length > 0) {
                questionsHtml = `
                    <div class="answer-card">
                        <div class="answer-card-header">
                            <h3>Questions to Ask</h3>
                            <span style="font-size:0.8125rem;color:var(--text-muted);">${questions.length} question${questions.length > 1 ? 's' : ''}</span>
                        </div>
                        ${questions.map(q => `
                            <div class="question-item">
                                <div class="question-text">${renderInline(q.question)}</div>
                                <div class="question-why">${renderInline(q.why)}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            // Escalation
            let escalationHtml = '';
            const esc = resp.escalation;
            if (esc && esc.needed) {
                escalationHtml = `
                    <div class="escalation-card">
                        <h3>Escalation Required</h3>
                        <p>${renderInline(esc.reason || 'No reason provided')}</p>
                    </div>
                `;
            }

            // Guardrails
            let guardrailsHtml = '';
            const guardrails = resp.guardrails_applied || [];
            if (guardrails.length > 0) {
                guardrailsHtml = `
                    <div class="answer-card">
                        <div class="answer-card-header">
                            <h3>Guardrails Applied</h3>
                        </div>
                        <div class="guardrails-list">
                            ${guardrails.map(g => `<span class="guardrail-pill">${escapeHtml(g)}</span>`).join('')}
                        </div>
                    </div>
                `;
            }

            // Data Gaps (from LLM response)
            let dataGapsHtml = '';
            const dataGaps = resp.data_gaps || [];
            if (dataGaps.length > 0) {
                dataGapsHtml = `
                    <div class="data-gaps-card">
                        <div class="answer-card-header" style="border-bottom-color: var(--bg-secondary);">
                            <h3>Data Gaps</h3>
                            <span style="font-size:0.8125rem;color:var(--text-muted);">${dataGaps.length} gap${dataGaps.length > 1 ? 's' : ''}</span>
                        </div>
                        <ul class="data-gaps-list">
                            ${dataGaps.map(g => `<li>${escapeHtml(g)}</li>`).join('')}
                        </ul>
                    </div>
                `;
            }

            const coverageGapsHtml = renderCoverageGaps(data.coverage_gaps);
            const sourceArticlesHtml = renderSourceArticles(data.source_articles, m);
            const usedChunksHtml = renderUsedChunks(data.used_chunks, 'gr');
            const strategyHtml = renderSearchStrategy(m);
            const rawJsonHtml = renderRawJsonToggle(data, 'grRawJson');

            return headerHtml + outcomeHtml + responseToParticipantHtml + questionsHtml
                + escalationHtml + guardrailsHtml + dataGapsHtml + coverageGapsHtml
                + sourceArticlesHtml + usedChunksHtml + strategyHtml + rawJsonHtml;
        }

        // ================================================================
        // Error renderer
        // ================================================================
        function renderError(data) {
            return `
                <div class="error-card">
                    <h3>Error</h3>
                    <p>${escapeHtml(data.message || data.detail || data.error || JSON.stringify(data))}</p>
                </div>
                ${renderRawJsonToggle(data, 'errorRawJson')}
            `;
        }

        // ================================================================
        // Health check
        // ================================================================
        async function checkHealth() {
            const apiUrl = document.getElementById('apiUrl').value;
            const badge = document.getElementById('statusBadge');

            try {
                const response = await fetch(`${apiUrl}/health`);
                const data = await response.json();

                if (data.status === 'healthy') {
                    badge.className = 'status-badge healthy';
                    badge.innerHTML = '<div class="status-dot"></div><span>Connected</span>';
                } else {
                    badge.className = 'status-badge unhealthy';
                    badge.innerHTML = '<div class="status-dot"></div><span>Degraded</span>';
                }
            } catch (error) {
                badge.className = 'status-badge unhealthy';
                badge.innerHTML = '<div class="status-dot"></div><span>Disconnected</span>';
            }
        }

        // ================================================================
        // Copy helpers
        // ================================================================
        function copyPayload() {
            const text = document.getElementById('payloadPreview').textContent;
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = 'Copied!';
                setTimeout(() => btn.textContent = originalText, 2000);
            });
        }
    </script>
</body>
</html>
